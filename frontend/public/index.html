<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Todo List</title>
  <link rel="stylesheet" href="styles.css">
  <script src="src/js/api.js"></script>
  <script src="src/js/utils.js"></script>
  <script src="src/js/app.js"></script>

</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>My Todo List</h1>
      <p>Stay organized and productive</p>
    </header>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="totalCount">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-number stat-active" id="activeCount">0</div>
        <div class="stat-label">Active</div>
      </div>
      <div class="stat-card">
        <div class="stat-number stat-completed" id="completedCount">0</div>
        <div class="stat-label">Completed</div>
      </div>
    </div>

    <!-- Add Task Form -->
    <div class="add-task">
      <input 
        type="text" 
        id="taskInput" 
        placeholder="Add a new task..." 
        class="task-input"
      >
      <button id="addBtn" class="btn btn-primary">
        <span>+</span> Add
      </button>
    </div>

    <!-- Filter Buttons -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <!-- Task List -->
    <div class="task-list" id="taskList">
      <div class="empty-state" id="emptyState">
        <p>No tasks found</p>
        <small>Add a task to get started!</small>
      </div>
    </div>

    <!-- Loading Indicator -->
    <div class="loading" id="loading" style="display: none;">
      <div class="spinner"></div>
    </div>

    <!-- Footer -->
    <footer class="footer" id="footer" style="display: none;">
      <span id="remainingTasks">0 tasks remaining</span>
    </footer>
  </div>  
</body>
</html>
